name: Refresh lvl13.tech

on:
  schedule:
    - cron: '35 14 * * 1-5'
    - cron: '5 16 * * 1-5'
    - cron: '5 21 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-lvl13-${{ hashFiles('**/refresh_lvl13.py') }}
          restore-keys: pip-lvl13-

      - name: Install dependencies
        run: |
          echo "=== Python version ==="
          python --version
          echo "=== pip version ==="
          python -m pip --version
          echo "=== Installing packages ==="
          python -m pip install --upgrade pip
          python -m pip install yfinance requests pandas
          echo "=== Installed packages ==="
          python -m pip list | grep -E "yfinance|requests|pandas|numpy"

      - name: Verify script exists
        run: |
          echo "=== Repo contents ==="
          ls -la
          echo "=== Script check ==="
          ls -la Project/scripts/refresh_lvl13.py
          echo "=== Data dir check ==="
          ls -la Frontends/lvl13.tech/data/

      - name: Run lvl13 refresh
        env:
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          INTERNAL_API_KEY: ${{ secrets.INTERNAL_API_KEY }}
        run: |
          echo "=== Running refresh script ==="
          python Project/scripts/refresh_lvl13.py
          echo "=== Script exit code: $? ==="

      - name: Commit and push updated data
        run: |
          git config user.name  "WallStBots Bot"
          git config user.email "bot@wallstbots.tech"
          git add Frontends/lvl13.tech/data/
          git diff --staged --quiet || git commit -m "auto: lvl13 data refresh [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push

      - name: Send daily email notifications
        # Scheduled: only sends at 14:xx UTC to avoid duplicates with wallstbots.yml.
        # Manual (workflow_dispatch): always sends — useful for testing.
        env:
          RESEND_API_KEY:   ${{ secrets.RESEND_API_KEY }}
          INTERNAL_API_KEY: ${{ secrets.INTERNAL_API_KEY }}
          BACKEND_URL:      ${{ secrets.BACKEND_URL }}
          EVENT_NAME:       ${{ github.event_name }}
        run: |
          HOUR=$(date -u +%H)
          echo "=== Email dispatch check: event=$EVENT_NAME hour=${HOUR}UTC ==="
          echo "=== Secrets present: RESEND=$([ -n "$RESEND_API_KEY" ] && echo YES || echo MISSING) BACKEND=$([ -n "$BACKEND_URL" ] && echo YES || echo MISSING) APIKEY=$([ -n "$INTERNAL_API_KEY" ] && echo YES || echo MISSING) ==="
          if [ "$EVENT_NAME" = "workflow_dispatch" ] || [ "$HOUR" = "14" ]; then
            echo "=== Dispatching consolidated daily email ==="
            python -m pip install --quiet requests
            python Project/scripts/send_emails.py
          else
            echo "=== Skipping email dispatch (scheduled run at hour=$HOUR, not 14:xx UTC) ==="
          fi

      # Deploy note: lvl13.tech is on Cloudflare Pages (migrated May 2026).
      # Pushing Frontends/lvl13.tech/data/ here auto-deploys via Cloudflare — no FTP needed.
