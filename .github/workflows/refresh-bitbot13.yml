name: Refresh bitbot13.tech

# Trading schedule: 7 days/week, 9am-9pm ET sessions.
# Runs every 30 minutes during the ET trading window; one quiet overnight reprice.
# The Python script itself gates on actual ET time — outside the window it holds cash.
# Fetches live coin prices + 1h intraday data, recalculates all bot P&L,
# generates signals + news, commits updated JSON, Cloudflare Pages auto-deploys.

on:
  schedule:
    # Every 30 min, 13:00-23:30 UTC — covers 9am-7:30pm EDT (Mar-Nov)
    - cron: '*/30 13-23 * * *'
    # Every 30 min, 00:00-02:30 UTC — covers 7pm-9pm EST (Nov-Mar) and wraps EDT
    - cron: '*/30 0-2 * * *'
    # One quiet off-hours reprice at 6am UTC (~1-2am ET) to keep data fresh overnight
    - cron: '0 6 * * *'
  workflow_dispatch:   # allow manual trigger from GitHub Actions UI if needed

permissions:
  contents: write      # needed to push updated data files back to the repo

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-bitbot13-${{ hashFiles('**/refresh_bitbot13.py') }}
          restore-keys: pip-bitbot13-

      - name: Install dependencies
        run: pip install yfinance requests

      - name: Run bitbot13 refresh
        env:
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          INTERNAL_API_KEY: ${{ secrets.INTERNAL_API_KEY }}
        run: python Project/scripts/refresh_bitbot13.py

      - name: Commit and push updated data
        run: |
          git config user.name  "BitBot13 Bot"
          git config user.email "bot@bitbot13.tech"
          git add Frontends/bitbot13.tech/data/
          # Only commit if files actually changed (avoids empty commit errors)
          git diff --staged --quiet || git commit -m "auto: bitbot13 data refresh [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push

      - name: Send daily email notifications
        # Scheduled: weekends only at 14:xx UTC (wallstbots handles weekdays).
        # Manual (workflow_dispatch): always sends — useful for testing.
        env:
          RESEND_API_KEY:   ${{ secrets.RESEND_API_KEY }}
          INTERNAL_API_KEY: ${{ secrets.INTERNAL_API_KEY }}
          BACKEND_URL:      ${{ secrets.BACKEND_URL }}
          EVENT_NAME:       ${{ github.event_name }}
        run: |
          DOW=$(date -u +%u)   # 1=Mon … 6=Sat 7=Sun
          HOUR=$(date -u +%H)
          echo "=== Email dispatch check: event=$EVENT_NAME DOW=$DOW hour=${HOUR}UTC ==="
          echo "=== Secrets present: RESEND=$([ -n "$RESEND_API_KEY" ] && echo YES || echo MISSING) BACKEND=$([ -n "$BACKEND_URL" ] && echo YES || echo MISSING) APIKEY=$([ -n "$INTERNAL_API_KEY" ] && echo YES || echo MISSING) ==="
          if [ "$EVENT_NAME" = "workflow_dispatch" ] || ([ "$DOW" -ge "6" ] && [ "$HOUR" = "14" ]); then
            echo "=== Dispatching consolidated daily email ==="
            python -m pip install --quiet requests
            python Project/scripts/send_emails.py
          else
            echo "=== Skipping email (scheduled run: DOW=$DOW, hour=$HOUR — not weekend 14:xx UTC) ==="
          fi
