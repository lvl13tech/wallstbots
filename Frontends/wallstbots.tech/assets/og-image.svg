<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#06080d"/>
      <stop offset="1" stop-color="#0d1117"/>
    </linearGradient>
    <filter id="g" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Robot icon left -->
  <g transform="translate(80,135)" fill="none" stroke="#00d4ff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" filter="url(#g)">
    <line x1="180" y1="0" x2="180" y2="20"/>
    <circle cx="180" cy="35" r="14"/>
    <line x1="180" y1="49" x2="180" y2="80"/>
    <rect x="60" y="92" width="240" height="180" rx="40"/>
    <ellipse cx="130" cy="180" rx="36" ry="24"/>
    <ellipse cx="230" cy="180" rx="36" ry="24"/>
    <circle cx="130" cy="180" r="11"/><circle cx="230" cy="180" r="11"/>
    <line x1="80" y1="270" x2="280" y2="270"/>
    <rect x="100" y="300" width="160" height="60" rx="20"/>
    <circle cx="140" cy="330" r="9"/><circle cx="180" cy="330" r="6"/><circle cx="220" cy="330" r="9"/>
  </g>
  <!-- Wordmark right -->
  <g transform="translate(460,140)" fill="#e6edf3" font-family="Helvetica,Arial,sans-serif">
