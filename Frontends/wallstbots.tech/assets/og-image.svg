    <text x="0" y="140" font-size="32" font-weight="600">AI &amp; Quantum Stock Tracker</text>
    <text x="0" y="220" font-size="28" fill="#7d8590">5 trading strategies. One universe.</text>
    <text x="0" y="258" font-size="28" fill="#7d8590">Watch them race.</text>
    <!-- chips -->
    <g font-size="14" font-weight="700" letter-spacing="1.2" fill="#06080d">
      <rect x="0"   y="320" width="100" height="34" rx="17" fill="#ec4899"/><text x="50"  y="343" text-anchor="middle">BOT13</text>
      <rect x="116" y="320" width="110" height="34" rx="17" fill="#a855f7"/><text x="171" y="343" text-anchor="middle">ORACLE</text>
      <rect x="242" y="320" width="110" height="34" rx="17" fill="#10b981"/><text x="297" y="343" text-anchor="middle">WIZARD</text>
      <rect x="368" y="320" width="140" height="34" rx="17" fill="#00d4ff"/><text x="438" y="343" text-anchor="middle">EQUALIZER</text>
      <rect x="524" y="320" width="100" height="34" rx="17" fill="#ff8c00"/><text x="574" y="343" text-anchor="middle">TITAN</text>
