<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up — Level XIII Tech</title>
  <style>
    :root {
      --bg: #06080d;
      --panel: #0d1117;
      --panel2: #141b27;
      --border: #1e2633;
      --text: #e6edf3;
      --muted: #7d8590;
      --accent: #00d4ff;
      --accent-dim: #003d47;
      --red: #f85149;
      --radius: 10px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .logo {
      font-size: 22px;
      font-weight: 800;
      color: var(--accent);
      margin-bottom: 4px;
      letter-spacing: -0.5px;
    }
    .logo span { color: var(--text); }
    .tagline { font-size: 13px; color: var(--muted); margin-bottom: 32px; }

    .card {
      width: 100%;
      max-width: 420px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
    }

    .card-header {
      padding: 20px 28px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--panel2);
    }
    .card-header h2 { font-size: 15px; font-weight: 700; }
    .card-header p { font-size: 12px; color: var(--muted); margin-top: 3px; }

    .form-body { padding: 28px; }

    .form-group { margin-bottom: 16px; }

    label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--muted);
      margin-bottom: 7px;
    }

    input {
      width: 100%;
      padding: 12px 14px;
      background: var(--panel2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: var(--accent); }
    input::placeholder { color: var(--muted); }

    .btn-submit {
      width: 100%;
      padding: 13px;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: var(--radius);
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 4px;
    }
    .btn-submit:hover { background: #00b8e0; transform: translateY(-1px); }
    .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .error-msg {
      background: rgba(248,81,73,0.1);
      border: 1px solid rgba(248,81,73,0.3);
      color: var(--red);
      font-size: 13px;
      padding: 10px 14px;
      border-radius: 8px;
      margin-bottom: 14px;
      display: none;
    }
    .success-msg {
      background: var(--accent-dim);
      border: 1px solid rgba(0,212,255,0.3);
      color: var(--accent);
      font-size: 13px;
      padding: 10px 14px;
      border-radius: 8px;
      margin-bottom: 14px;
      display: none;
    }

    .promo-note {
      margin-top: 18px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
      font-size: 12px;
      color: var(--muted);
      text-align: center;
      line-height: 1.6;
    }
    .promo-note strong { color: var(--accent); }
    .promo-note a { color: var(--accent); text-decoration: none; }
    .promo-note a:hover { text-decoration: underline; }

    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid rgba(0,0,0,0.3);
      border-top-color: #000;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .back-link {
      margin-top: 20px;
      font-size: 13px;
      color: var(--muted);
    }
    .back-link a { color: var(--accent); text-decoration: none; }
    .back-link a:hover { text-decoration: underline; }

    .cross-platform {
      margin-top: 20px;
      font-size: 12px;
      color: var(--muted);
      text-align: center;
      max-width: 340px;
    }

    @media (max-width: 480px) {
      body { padding: 16px; justify-content: flex-start; padding-top: 40px; }
      .card { border-radius: 10px; }
      .form-body { padding: 20px 18px; }
      .card-header { padding: 16px 18px 14px; }
    }
  </style>
</head>
<body>

  <div class="logo">Level XIII <span>Tech</span></div>
  <div class="tagline">AI &amp; Quantum Trading Intelligence</div>

  <div class="card">
    <div class="card-header">
      <h2>Create your account</h2>
      <p>Free to start · No credit card required</p>
    </div>
    <div class="form-body">
      <div id="errorMsg" class="error-msg"></div>
      <div id="successMsg" class="success-msg"></div>

      <div class="form-group">
        <label for="fullName">Full Name</label>
        <input type="text" id="fullName" placeholder="Your name" autocomplete="name" />
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email" required />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Min. 8 characters" autocomplete="new-password" required />
      </div>
      <div class="form-group">
        <label for="confirmPassword">Confirm Password</label>
        <input type="password" id="confirmPassword" placeholder="Repeat password" autocomplete="new-password" required />
      </div>
      <div class="form-group">
        <label>Promo Code <span style="color:var(--muted);font-weight:400;text-transform:none">(optional)</span></label>
        <input type="text" id="promoCode" placeholder="e.g. levelUp13" autocomplete="off" />
      </div>

      <button class="btn-submit" id="submitBtn" onclick="handleSignup()">Create Account</button>

      <div class="promo-note">
        Use code <strong>levelUp13</strong> to get started free.<br/>
        Already have an account? <a href="/login.html">Log in →</a>
      </div>
    </div>
  </div>

  <div class="cross-platform">
    🔗 One account works across BitBot13, Level XIII Tech, and Wall St. Bots.
  </div>

  <div class="back-link"><a href="/">← Back to home</a></div>

  <script src="/auth.js"></script>
