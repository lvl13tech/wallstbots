<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — Level XIII Tech</title>
  <style>
    :root {
      --bg: #06080d;
      --panel: #0d1117;
      --panel2: #141b27;
      --border: #1e2633;
      --text: #e6edf3;
      --muted: #7d8590;
      --green: #00d4ff;
      --green-dim: #003d47;
      --red: #f85149;
      --radius: 10px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .logo {
      font-size: 22px;
      font-weight: 800;
      color: var(--green);
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }

    .logo span { color: var(--text); }

    .tagline {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 36px;
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
    }

    .tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      border-bottom: 1px solid var(--border);
    }

    .tab {
      padding: 16px;
      text-align: center;
      font-size: 14px;
      font-weight: 600;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.2s;
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
    }

    .tab.active {
      color: var(--green);
      border-bottom-color: var(--green);
      background: var(--panel2);
    }

    .form-body { padding: 32px; }

    .form-group { margin-bottom: 18px; }

    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--muted);
      margin-bottom: 8px;
    }

    input {
      width: 100%;
      padding: 12px 14px;
      background: var(--panel2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus { border-color: var(--green); }
    input::placeholder { color: var(--muted); }

    .btn-submit {
      width: 100%;
      padding: 14px;
      background: var(--green);
      color: #000;
      border: none;
      border-radius: var(--radius);
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 6px;
    }

    .btn-submit:hover {
      background: #00b8e0;
      transform: translateY(-1px);
      box-shadow: 0 8px 20px rgba(63,185,80,0.3);
    }

    .btn-submit:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .error-msg {
      background: rgba(248,81,73,0.1);
      border: 1px solid rgba(248,81,73,0.3);
      color: var(--red);
      font-size: 13px;
      padding: 10px 14px;
      border-radius: 8px;
      margin-bottom: 16px;
      display: none;
    }

    .success-msg {
      background: var(--green-dim);
      border: 1px solid rgba(63,185,80,0.3);
      color: var(--green);
      font-size: 13px;
      padding: 10px 14px;
      border-radius: 8px;
      margin-bottom: 16px;
      display: none;
    }

    .promo-note {
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
      font-size: 12px;
      color: var(--muted);
      text-align: center;
    }

    .promo-note strong { color: var(--green); }

    .back-link {
      margin-top: 20px;
      font-size: 13px;
      color: var(--muted);
    }

    .back-link a { color: var(--green); text-decoration: none; }
    .back-link a:hover { text-decoration: underline; }

    .form-panel { display: none; }
    .form-panel.active { display: block; }

    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(0,0,0,0.3);
      border-top-color: #000;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .cross-platform {
      margin-top: 24px;
      font-size: 12px;
      color: var(--muted);
      text-align: center;
      max-width: 340px;
    }
  </style>
</head>
<body>

  <div class="logo">Level XIII <span>Tech</span></div>
  <div class="tagline">Track the market like a pro.</div>

  <div class="card">
    <div class="tabs">
      <button class="tab active" id="tabLogin" onclick="switchTab('login')">Log In</button>
      <button class="tab" id="tabSignup" onclick="switchTab('signup')">Sign Up</button>
    </div>

    <div class="form-body">
      <div id="errorMsg" class="error-msg"></div>
      <div id="successMsg" class="success-msg"></div>

      <!-- LOGIN FORM -->
      <div class="form-panel active" id="loginPanel">
        <div class="form-group">
          <label for="loginEmail">Email</label>
          <input type="email" id="loginEmail" placeholder="you@example.com" autocomplete="email" />
        </div>
        <div class="form-group">
          <label for="loginPassword">Password</label>
          <input type="password" id="loginPassword" placeholder="Your password" autocomplete="current-password" />
        </div>
        <button class="btn-submit" id="loginBtn" onclick="handleLogin()">Log In</button>
        <div class="promo-note">
          Don't have an account? <a href="#" onclick="switchTab('signup');return false;" style="color:var(--green)">Sign up free →</a>
        </div>
      </div>

      <!-- SIGNUP FORM -->
      <div class="form-panel" id="signupPanel">
        <div class="form-group">
          <label for="signupName">Full Name</label>
          <input type="text" id="signupName" placeholder="Your name" autocomplete="name" />
        </div>
        <div class="form-group">
          <label for="signupEmail">Email</label>
          <input type="email" id="signupEmail" placeholder="you@example.com" autocomplete="email" />
        </div>
        <div class="form-group">
          <label for="signupPassword">Password</label>
          <input type="password" id="signupPassword" placeholder="Min. 8 characters" autocomplete="new-password" />
        </div>
        <div class="form-group">
          <label for="signupPromo">Promo Code <span style="color:var(--muted);font-weight:400;text-transform:none">(optional)</span></label>
          <input type="text" id="signupPromo" placeholder="e.g. levelUp13" autocomplete="off" />
        </div>
        <button class="btn-submit" id="signupBtn" onclick="handleSignup()">Create Account</button>
        <div class="promo-note">
          Use code <strong>levelUp13</strong> to get started free. <br/>
          Already have an account? <a href="#" onclick="switchTab('login');return false;" style="color:var(--green)">Log in →</a>
        </div>
      </div>
    </div>
  </div>

  <div class="cross-platform">
    🔗 One account works across Wall St. Bots, BitBot13, and Level XIII Tech.
  </div>

  <div class="back-link"><a href="/">← Back to home</a></div>

  <script src="/auth.js"></script>
  <script>
    const API_BASE = "https://wallstbots-backend-868128114349.us-east1.run.app";
    const auth = new WallStBotsAuth(API_BASE);

    // If already logged in, go straight to dashboard
    if (auth.isAuthenticated() && !auth.isTokenExpired()) {
      window.location.href = "/dashboard.html";
    }

    // Check hash for tab
    if (window.location.hash === "#signup") switchTab("signup");

    function switchTab(tab) {
      document.getElementById("loginPanel").classList.toggle("active", tab === "login");
      document.getElementById("signupPanel").classList.toggle("active", tab === "signup");
      document.getElementById("tabLogin").classList.toggle("active", tab === "login");
      document.getElementById("tabSignup").classList.toggle("active", tab === "signup");
      clearMessages();
    }

    function showError(msg) {
      const el = document.getElementById("errorMsg");
      el.textContent = msg;
      el.style.display = "block";
      document.getElementById("successMsg").style.display = "none";
    }

    function showSuccess(msg) {
      const el = document.getElementById("successMsg");
      el.textContent = msg;
      el.style.display = "block";
      document.getElementById("errorMsg").style.display = "none";
    }

    function clearMessages() {
      document.getElementById("errorMsg").style.display = "none";
      document.getElementById("successMsg").style.display = "none";
    }

    function setLoading(btnId, loading, text) {
      const btn = document.getElementById(btnId);
      btn.disabled = loading;
      btn.innerHTML = loading
        ? `<span class="spinner"></span> ${text}`
        : text;
    }

    // Allow Enter key to submit
    document.addEventListener("keydown", (e) => {
      if (e.key !== "Enter") return;
      if (document.getElementById("loginPanel").classList.contains("active")) {
        handleLogin();
      } else {
        handleSignup();
      }
    });

    async function handleLogin() {
      const email = document.getElementById("loginEmail").value.trim();
      const password = document.getElementById("loginPassword").value;

      if (!email || !password) { showError("Please enter your email and password."); return; }

      setLoading("loginBtn", true, "Logging in…");
      clearMessages();

      try {
        await auth.login(email, password);
        const redirect = new URLSearchParams(window.location.search).get("redirect");
        window.location.href = redirect || "/dashboard.html";
      } catch (err) {
        showError(err.message || "Login failed. Check your credentials and try again.");
        setLoading("loginBtn", false, "Log In");
      }
    }

    async function handleSignup() {
      const name = document.getElementById("signupName").value.trim();
      const email = document.getElementById("signupEmail").value.trim();
      const password = document.getElementById("signupPassword").value;

      if (!email || !password) { showError("Email and password are required."); return; }
      if (password.length < 8) { showError("Password must be at least 8 characters."); return; }

      setLoading("signupBtn", true, "Creating account…");
      clearMessages();

      try {
        const result = await auth.signup(email, password, name || null);
        showSuccess(result.message || "Account created! Check your email to confirm, then log in.");
        setLoading("signupBtn", false, "Create Account");

        // If token was returned (auto-login), go to dashboard
        if (auth.isAuthenticated()) {
          setTimeout(() => { window.location.href = "/dashboard.html"; }, 1500);
        }
      } catch (err) {
        showError(err.message || "Signup failed. This email may already be registered.");
        setLoading("signupBtn", false, "Create Account");
      }
    }
  </script>
</body>
</html>
